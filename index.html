function App() {
  const [gameState, setGameState] = useState('welcome'); // 'welcome', 'playing', 'result'
  const [currentScenarioIndex, setCurrentScenarioIndex] = useState(0);
  const [score, setScore] = useState(0);

  const startGame = () => {
    setGameState('playing');
    setCurrentScenarioIndex(0);
    setScore(0);
  };

  const handleFinish = (finalScore) => {
    setScore(finalScore);
    setGameState('result');
  };

  return (
    <>
      <div className="bg-orbs">
        <div className="orb orb-1"></div>
        <div className="orb orb-2"></div>
        <div className="orb orb-3"></div>
      </div>
      <div className="app-container slide-up">
        {gameState === 'welcome' && <WelcomeScreen onStart={startGame} />}
        {gameState === 'playing' && (
          <GameScreen 
            scenarioIndex={currentScenarioIndex} 
            totalScenarios={scenarios.length}
            score={score}
            setScore={setScore}
            onNext={(nextIndex) => {
              if (nextIndex >= scenarios.length) {
                handleFinish(score + 1); // +1 assuming they got it right, score tracking handled inside
              } else {
                setCurrentScenarioIndex(nextIndex);
              }
            }}
            onFinish={handleFinish}
          />
        )}
        {gameState === 'result' && (
          <ResultScreen score={score} total={scenarios.length} onRestart={startGame} />
        )}
      </div>
    </>
  );
}

function GameScreen({ scenarioIndex, totalScenarios, score, setScore, onNext, onFinish }) {

  const [selectedDisc, setSelectedDisc] = useState(null);

  const [showFeedback, setShowFeedback] = useState(false);
  const [isCorrect, setIsCorrect] = useState(false);
  
  const scenario = scenarios[scenarioIndex];
  const progress = ((scenarioIndex) / totalScenarios) * 100;

    setStep(1);
    setSelectedDisc(null);
    setSelectedResponse(null);
    setShowFeedback(false);
  }, [scenarioIndex]);

    setSelectedDisc(type);
  };

    if (!selectedDisc) return;
    if (selectedDisc === scenario.customerType) {

    } else {
      setIsCorrect(false);
      setShowFeedback(true);
    }

    setSelectedResponse(id);
  };

    if (!selectedResponse) return;
    
    const correct = selectedResponse === scenario.correctAnswer;
    setIsCorrect(correct);
    setShowFeedback(true);
    if (correct) {
      setScore(s => s + 1);
    }
  };

    setShowFeedback(false);
    if (isCorrect) {

      if (scenarioIndex + 1 === totalScenarios) {
        onFinish(score + (isCorrect ? 1 : 0));
      } else {
        onNext(scenarioIndex + 1);
      }

           setSelectedDisc(null); // Let them try again
       } else {
           setSelectedResponse(null);
       }
    }

        </div>
        <div className="score-badge"><i className="fa-solid fa-star"></i> {score}</div>
      </div>

                onClick={() => handleDiscSelect(opt.type)}
              >
                <div className="option-char">{opt.type}</div>
                <div>{opt.label}</div>
              </div>
            ))}
          </div>
          <button 
            className="btn" 
            onClick={handleDiscSubmit}
            disabled={!selectedDisc}
            style={{ opacity: selectedDisc ? 1 : 0.5, cursor: selectedDisc ? 'pointer' : 'not-allowed', alignSelf: 'center', marginTop: '10px' }}
          >
            XÃ¡c nháº­n
          </button>
